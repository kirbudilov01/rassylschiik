version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: outreach_api
    ports:
      - "8080:8080"
    env_file:
      - .env.repo
    volumes:
      - ./:/app
      - ./data:/app/data
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: outreach_worker
    env_file:
      - .env.repo
    volumes:
      - ./:/app
      - ./data:/app/data
    depends_on:
      - api
    restart: unless-stopped
